resolver 127.0.0.11 valid=10s;

server {
  listen 5173;

  location /api/ {
    # core-api's container IP changes on every restart/recreate. A bare `proxy_pass` hostname is
    # resolved once (at config load / first connection) and then cached indefinitely, so nginx keeps
    # talking to the old IP after core-api restarts — causing 502s until nginx itself is restarted.
    # Routing through a variable forces nginx to re-resolve via the `resolver` above on each request.
    set $core_api core-api:3000;
    # No path suffix here: with a variable, proxy_pass forwards the original request URI unchanged
    # (unlike a literal proxy_pass, which rewrites/appends paths) — core-api already expects
    # /api/v1/... paths, so passing the incoming URI through as-is is exactly what's needed.
    proxy_pass http://$core_api;
    proxy_set_header Host $host;
  }

  location /registry/ {
    # Strips the /registry prefix so e.g. /registry/api/v1/registry/plugins reaches the registry
    # service at /api/v1/registry/plugins. Same DNS-refresh pattern as the /api/ block above.
    set $registry_api registry:4000;
    rewrite ^/registry/(.*)$ /$1 break;
    proxy_pass http://$registry_api;
    proxy_set_header Host $host;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}
