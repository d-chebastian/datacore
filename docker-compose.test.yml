services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: datacore
      POSTGRES_PASSWORD: datacore
      POSTGRES_DB: datacore_test
    ports:
      - '5533:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U datacore']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5673:5672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: datacore
      MINIO_ROOT_PASSWORD: datacore123
    ports:
      - '9100:9000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6433:6333'
